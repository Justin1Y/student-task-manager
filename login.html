<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Task Manager - Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">
<main class="login-shell">
  <section class="login-panel">
    <div class="login-card">
      <div class="login-card-header">
        <div class="logo-icon">🎓</div>
        <div>
          <h1 class="login-title">Sign In</h1>
        </div>
      </div>

      <p class="login-copy">Enter your account and password to continue.</p>

      <form id="loginForm" class="login-form">
        <label for="accountInput">Account</label>
        <input
          id="accountInput"
          name="account"
          type="text"
          placeholder="Enter your account"
          autocomplete="username"
        />

        <label for="passwordInput">Password</label>
        <input
          id="passwordInput"
          name="password"
          type="password"
          placeholder="Enter your password"
          autocomplete="current-password"
        />

        <button id="loginBtn" class="primary-btn login-submit-btn" type="submit">Log In</button>
      </form>

      <p class="auth-switch-text">
        New here?
        <a href="register.html" class="auth-switch-link">Create an account</a>
      </p>
    </div>
  </section>
</main>

<script src="js/app.js"></script>
</body>
</html>
