<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Task Manager - Register</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">
<main class="login-shell">
  <section class="login-panel">
    <div class="login-card">
      <div class="login-card-header">
        <div class="logo-icon">🎓</div>
        <div>
          <h1 class="login-title">Create Account</h1>
        </div>
      </div>

      <p class="login-copy">Create your workspace and sign in right away.</p>

      <form id="registerForm" class="login-form">
        <label for="tenantNameInput">Workspace Name</label>
        <input
          id="tenantNameInput"
          name="tenantName"
          type="text"
          placeholder="Enter your workspace name"
          autocomplete="organization"
        />

        <label for="nameInput">Your Name</label>
        <input
          id="nameInput"
          name="name"
          type="text"
          placeholder="Enter your name"
          autocomplete="name"
        />

        <label for="registerAccountInput">Account</label>
        <input
          id="registerAccountInput"
          name="account"
          type="text"
          placeholder="Choose an account"
          autocomplete="username"
        />

        <label for="registerPasswordInput">Password</label>
        <input
          id="registerPasswordInput"
          name="password"
          type="password"
          placeholder="Create a password"
          autocomplete="new-password"
        />

        <button id="registerBtn" class="primary-btn login-submit-btn" type="submit">Create Account</button>
      </form>

      <p class="auth-switch-text">
        Already have an account?
        <a href="login.html" class="auth-switch-link">Log in</a>
      </p>
    </div>
  </section>
</main>

<script src="js/app.js"></script>
</body>
</html>
